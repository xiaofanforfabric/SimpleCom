name: Build (V2+)

on:
  push:
    branches: [ "V2.0" ]
    tags: [ "V2.*" ]
  pull_request:
    branches: [ "V2.0" ]

jobs:
  build-v2-client-fabric:
    name: V2.0new / SimpleCom-Client-fabric
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: V2.0new/SimpleCom-Client-fabric
      - name: Fix gradlew
        working-directory: V2.0new/SimpleCom-Client-fabric
        run: chmod +x gradlew
      - name: Build
        working-directory: V2.0new/SimpleCom-Client-fabric
        run: ./gradlew build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2.0new-SimpleCom-Client-fabric
          path: V2.0new/SimpleCom-Client-fabric/build/libs/*.jar

  build-v2-client-forge:
    name: V2.0new / SimpleCom-Client-forge
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: V2.0new/SimpleCom-Client-forge
      - name: Fix gradlew
        working-directory: V2.0new/SimpleCom-Client-forge
        run: chmod +x gradlew
      - name: Build
        working-directory: V2.0new/SimpleCom-Client-forge
        run: ./gradlew build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2.0new-SimpleCom-Client-forge
          path: V2.0new/SimpleCom-Client-forge/build/libs/*.jar

  build-v2-server-bukkit:
    name: V2.0new / SimpleCom-server (Bukkit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: V2.0new/SimpleCom-server
      - name: Fix gradlew
        working-directory: V2.0new/SimpleCom-server
        run: chmod +x gradlew
      - name: Build
        working-directory: V2.0new/SimpleCom-server
        run: ./gradlew build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2.0new-SimpleCom-server
          path: V2.0new/SimpleCom-server/build/libs/*.jar

  build-v2-server-all-1-20-1:
    name: V2.0new / simpleCom-server-all-1.20.1
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: V2.0new/simpleCom-server-all-1.20.1
      - name: Fix gradlew
        working-directory: V2.0new/simpleCom-server-all-1.20.1
        run: chmod +x gradlew
      - name: Build
        working-directory: V2.0new/simpleCom-server-all-1.20.1
        run: ./gradlew build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2.0new-simpleCom-server-all-1.20.1
          path: V2.0new/simpleCom-server-all-1.20.1/**/build/libs/*.jar

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs:
      - build-v2-client-fabric
      - build-v2-client-forge
      - build-v2-server-bukkit
      - build-v2-server-all-1-20-1
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files (unique names)
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for f in "$dir"*.jar; do
              [ -f "$f" ] && cp "$f" "release/${name}-$(basename "$f")"
            done
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          replace_assets: false
          files: release/*.jar
