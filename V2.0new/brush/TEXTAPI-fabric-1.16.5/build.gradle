    "1.16.5": [sourceDir: "java-1.16", loader: "0.18.4"],
    "1.17":   [sourceDir: "java-1.17", loader: "0.11.7"],
    "1.17.1": [sourceDir: "java-1.17", loader: "0.11.7"],
    "1.18":   [sourceDir: "java-1.18", loader: "0.12.12"],
    "1.18.1": [sourceDir: "java-1.18", loader: "0.12.12"],
    "1.18.2": [sourceDir: "java-1.18", loader: "0.13.3"],
    "1.19":   [sourceDir: "java-1.19", loader: "0.14.10"],
    "1.19.1": [sourceDir: "java-1.19", loader: "0.14.10"],
    "1.19.2": [sourceDir: "java-1.19", loader: "0.14.21"],
    "1.19.3": [sourceDir: "java-1.19", loader: "0.14.23"],
    "1.19.4": [sourceDir: "java-1.19", loader: "0.14.25"],
    "1.20":   [sourceDir: "java-1.20", loader: "0.14.22"],
    "1.20.1": [sourceDir: "java-1.20", loader: "0.14.22"],
    "1.20.2": [sourceDir: "java-1.20", loader: "0.14.24"],
    "1.20.4": [sourceDir: "java-1.20", loader: "0.14.26"],
    "1.20.6": [sourceDir: "java-1.20", loader: "0.15.7"],
    "1.21":   [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.1": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.2": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.3": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.4": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.5": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.6": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.7": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.8": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.9": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.10": [sourceDir: "java-1.21", loader: "0.16.0"],
    "1.21.11": [sourceDir: "java-1.21", loader: "0.16.0"]
]

/**
 * 为每个版本创建构建任务
 * 使用方法: gradlew build1165
 * 
 * 这些任务会启动新的 Gradle 进程并传递版本参数
 */
versionConfigs.each { version, config ->
    def taskName = "build${version.replace('.', '')}"
    def versionSourceDirPath = "src/main/${config.get('sourceDir')}"
    
    tasks.register(taskName, Exec) {
        group = "versioned build"
        description = "构建 Minecraft ${version} 版本的模组"
        
        // 查找 gradlew 脚本（使用绝对路径）
        def gradlewScript = project.file("gradlew.bat")
        if (!System.getProperty("os.name").toLowerCase().contains("win")) {
            gradlewScript = project.file("gradlew")
        }
        
        // 设置命令
        // 注意：Gradle 属性值中的点号需要用引号包裹，或者使用环境变量
        if (gradlewScript.exists()) {
            if (System.getProperty("os.name").toLowerCase().contains("win")) {
                commandLine "cmd", "/c", "\"${gradlewScript.absolutePath}\"", "build",
                    "-Ptarget_version=\"${version}\"",
                    "-Ptarget_loader_version=\"${config.get('loader')}\""
            } else {
                commandLine "bash", gradlewScript.absolutePath, "build",
                    "-Ptarget_version=\"${version}\"",
                    "-Ptarget_loader_version=\"${config.get('loader')}\""
            }
        } else {
            // 使用系统 gradle
            commandLine "gradle", "build",
                "-Ptarget_version=\"${version}\"",
                "-Ptarget_loader_version=\"${config.get('loader')}\""
        }
        
        // 设置工作目录
        workingDir = project.projectDir
        
        // 设置环境变量（如果需要）
        environment = System.getenv()
        
        doFirst {
            println "========================================"
            println "构建 Minecraft ${version} 版本"
            println "源代码目录: ${versionSourceDirPath}"
            println "Fabric Loader: ${config.get('loader')}"
            println "工作目录: ${workingDir}"
            println "命令: ${commandLine.join(' ')}"
            println "========================================"
        }
        
        doLast {
            println "========================================"
            println "Minecraft ${version} 版本构建完成！"
            println "========================================"
        }
    }
}

/**
 * 创建构建所有版本的任务
 */
tasks.register('buildAllVersions') {
    group = "versioned build"
    description = "构建所有支持的版本"
    
    versionConfigs.each { version, config ->
        def taskName = "build${version.replace('.', '')}"
        dependsOn taskName
    }
    
    doLast {
        println "========================================"
        println "所有版本构建完成！"
        println "========================================"
    }
}

/**
 * 显示所有可用的版本构建任务
 */
tasks.register('listVersions') {
    group = "versioned build"
    description = "列出所有支持的版本"
    
    doLast {
        println "========================================"
        println "支持的 Minecraft 版本:"
        println "========================================"
        versionConfigs.each { version, config ->
            def taskName = "build${version.replace('.', '')}"
            println "  ${taskName.padRight(15)} - Minecraft ${version.padRight(8)} (Loader ${config.loader})"
        }
        println "========================================"
        println "使用方法: gradlew build1165"
        println "          gradlew build1171"
        println "          gradlew build182"
        println "          gradlew build192"
        println "          ..."
        println "          gradlew build21111"
        println "========================================"
    }
}
